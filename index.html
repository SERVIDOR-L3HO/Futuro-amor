<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corazón a Corazón - Conóceme</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="floating-hearts" id="hearts-container"></div>
  
  <main class="container">
    <header>
      <div id="auth-status" class="auth-bar">
        <button id="login-btn" class="btn-auth">Iniciar Sesión con Google</button>
        <div id="user-info" class="hidden">
          <span id="user-name"></span>
          <button id="logout-btn" class="btn-auth-small">Cerrar Sesión</button>
        </div>
      </div>
      <h1>Corazón a Corazón</h1>
      <p class="subtitle">Un viaje para descubrir quién eres realmente...</p>
    </header>

    <div id="quiz-container" class="card hidden">
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      
      <div id="question-content">
        <h2 id="question-text">¿Cargando preguntas con amor...?</h2>
        <div id="options-container">
          <!-- Las opciones se cargarán aquí -->
        </div>
        <div id="input-container" class="hidden">
          <input type="text" id="text-answer" placeholder="Escribe tu respuesta aquí...">
          <button id="next-btn" class="btn-primary">Continuar</button>
        </div>
      </div>

      <div id="result-screen" class="hidden">
        <h2>¡Gracias por compartir tu corazón!</h2>
        <p>He guardado cada una de tus palabras como un tesoro.</p>
        <div id="summary"></div>
        <button onclick="location.reload()" class="btn-secondary">Empezar de nuevo</button>
      </div>
    </div>

    <!-- Pantalla de Bienvenida/Login -->
    <div id="login-screen" class="card">
      <div class="login-content">
        <i class="heart-icon">❤️</i>
        <h2>Bienvenido a Corazón a Corazón</h2>
        <p>Para comenzar este viaje especial, por favor inicia sesión.</p>
        <button id="main-login-btn" class="btn-primary">Iniciar Sesión con Google</button>
      </div>
    </div>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
